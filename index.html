<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>整張模糊效果</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: #222;
  }
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: rgba(255, 255, 255, 0.4); /* 更輕盈透明 */
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  font-weight: 500;
  z-index: 100;
  transition: background 0.5s ease, box-shadow 0.5s ease;
  font-family: 'Noto Sans TC', 'Yu Gothic UI', sans-serif;
}

nav.scrolled {
  background: rgba(255, 255, 255, 0.92);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05); /* 柔和陰影 */
}

nav a {
  text-decoration: none;
  color: #5f5f5f;
  font-size: 1.05rem;
  transition: color 0.2s ease;
  padding: 8px 4px;
  border-bottom: 2px solid transparent;
}

nav a:hover {
  color: #a384bd; /* 柔紫 */
  border-bottom: 2px solid #a384bd;
}

  .hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center; /* 水平置中 */
  align-items: center;     /* 垂直置中 ←←← 關鍵！ */
}

  .hero img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .clean {
    z-index: 1;
  }
  .blur {
    z-index: 2;
    filter: blur(0);
    transition: filter 1s ease;
    opacity: 1;
  }
  .hero-text {
  position: relative;
  z-index: 3;
  color: white;
  padding: 40px 30px;
  text-align: center;
  background: rgba(0,0,0,0.45);
  max-width: 80%;
  border-radius: 12px;
}

  main {
    background: white;
    padding: 40px 20px;
    max-width: 900px;
    margin: 0 auto 50px;
  }
  h2 {
    color: #222;
    margin-bottom: 20px;
  }
  p {
    line-height: 1.6;
    font-size: 1.1rem;
    color: #555;
  }

  /* 漢堡按鈕 */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
  gap: 6px;
  z-index: 101;
  transition: 0.3s ease;
}

.hamburger div {
  width: 24px;
  height: 2px;
  background: #333;
  border-radius: 2px;
  transition: 0.3s ease;
}

/* 漢堡按鈕變X動畫 */
.hamburger.active div:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.hamburger.active div:nth-child(2) {
  opacity: 0;
}

.hamburger.active div:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

/* 手機版選單 */
.mobile-menu {
  display: none;
  position: fixed;
  top: 60px; /* 跟nav高度一致 */
  left: 0;
  width: 100%;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 30px 0;
  z-index: 99;
}

.mobile-menu.active {
  display: flex;
}

/* 手機 RWD */
@media (max-width: 768px) {
  .nav-links {
    display: none;
  }
  .hamburger {
    display: flex;
  }
}

  @media (max-width: 768px) {
  nav {
    gap: 16px;
    font-size: 0.95rem;
    height: 56px;
  }

  nav a {
    font-size: 0.95rem;
    padding: 6px 2px;
  }

  .hero-text {
    font-size: 0.95rem;
    padding: 20px 16px;
  }

  h1 {
    font-size: 1.6rem;
  }

  h2 {
    font-size: 1.3rem;
  }

  p {
    font-size: 1rem;
  }

  main {
    padding: 24px 16px;
  }
}

</style>
</head>
<body>

<nav id="navbar">
  <div style="font-weight: 600; color: inherit;">XML's Blog</div>
  <div class="nav-links">
    <a href="#about">關於我</a>
    <a href="#projects">作品集</a>
    <a href="#contact">聯絡我</a>
  </div>

  <!-- 漢堡按鈕 -->
  <div class="hamburger" id="hamburger" aria-label="切換選單" role="button" tabindex="0">
    <div></div>
    <div></div>
    <div></div>
  </div>
</nav>

<!-- 手機選單 -->
<div class="mobile-menu" id="mobileMenu" aria-hidden="true">
  <a href="#about">關於我</a>
  <a href="#projects">作品集</a>
  <a href="#contact">聯絡我</a>
</div>



<section class="hero" id="hero">
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1350&q=80" class="clean" />
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1350&q=80" class="blur" id="blurImg" />
  <div class="hero-text">
    <h1>Welcome to XML's Blog</h1>
    <p>喜歡音樂、寫程式，也愛分享生活點滴</p>
  </div>
</section>

<main>
  <section id="about">
    <h2>關於我</h2>
    <p>這是白色底區塊，下面可以放更多內容。</p>
  </section>
  <section id="projects">
    <h2>作品集</h2>
    <p>展示你的作品、專案或模板融合紀錄。</p>
  </section>
  <section id="contact">
    <h2>聯絡我</h2>
    <p>email@example.com</p>
  </section>
</main>

<script>
  const blurImg = document.getElementById('blurImg');
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const maxBlur = 4;
    const speed = 60;
    const blur = Math.min(scrollY / speed, maxBlur);
    blurImg.style.filter = `blur(${blur}px)`;
  });

  const nav = document.querySelector("nav");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 50) {
      nav.classList.add("scrolled");
    } else {
      nav.classList.remove("scrolled");
    }
  });
  hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');      // 漢堡變 X
  mobileMenu.classList.toggle('active');     // 選單顯示/隱藏
  // aria 狀態同步（無障礙）
  const expanded = hamburger.classList.contains('active');
  mobileMenu.setAttribute('aria-hidden', !expanded);
});

// 點選選單連結自動關閉（手機版體驗佳）
document.querySelectorAll('.mobile-menu a').forEach(link => {
  link.addEventListener('click', () => {
    mobileMenu.classList.remove('active');
    hamburger.classList.remove('active');
    mobileMenu.setAttribute('aria-hidden', 'true');
  });
});
</script>

</body>
</html>
